syntax = "proto3";

package climate;

message ClimateReading {
  uint32 device_id   = 1;  // short numeric ID
  uint32 ts_ms       = 2;  // timestamp (ms or seconds, your choice)

  uint32 mq135_ppm   = 3;  // air quality

  uint32 water_level_mm      = 4;  // water level in mm
  uint32 rain_intensity_x10  = 5;  // rain intensity * 10

  uint32 battery_mv  = 6;  // battery voltage * 1000 (mV)

  sint32 lat_e7      = 7;  // latitude * 1e7
  sint32 lon_e7      = 8;  // longitude * 1e7
}